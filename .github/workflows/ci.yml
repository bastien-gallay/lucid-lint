name: CI

on:
  push:
    branches: [main, 'release/*']
  pull_request:
    branches: [main, 'release/*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      docs: ${{ steps.filter.outputs.docs }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@de90ccad5b66d1da68c2020ef39f15c10be141a0 # v3.0.2
        id: filter
        with:
          filters: |
            rust:
              - 'src/**/*.rs'
              - 'tests/**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'clippy.toml'
              - 'rustfmt.toml'
            docs:
              - 'docs/**/*.md'
              - '*.md'
            infra:
              - '.github/workflows/**'
              - 'justfile'
              - 'scripts/**'

  fmt:
    name: Format
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags upstream)
        with:
          toolchain: stable
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags upstream)
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Run clippy
        run: cargo clippy --all-features --all-targets --workspace -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) && 'ubuntu-latest' || 'ubuntu-latest' }}
          - ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) && 'macos-latest' || '' }}
          - ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) && 'windows-latest' || '' }}
    exclude:
      - os: ''
    env:
      # Opt-in gate checked by `tests/rule_docs_coverage.rs`: when set,
      # any rule source modified versus `origin/main` must be mentioned in
      # the CHANGELOG `## [Unreleased]` section.
      RULE_DOCS_GATE_GIT: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch full history so the docs-gate test can diff against origin/main.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags upstream)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Run tests
        run: cargo test --all-features --workspace

  msrv:
    name: MSRV (Minimum Supported Rust Version)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Extract MSRV from Cargo.toml
        id: msrv
        run: |
          VERSION=$(grep '^rust-version' Cargo.toml | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Check builds with MSRV
        run: cargo check --all-features --workspace

  docs:
    name: Build docs (mdBook)
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so check_lang_staleness.py can resolve each
          # EN page's last-touching commit (shallow clone only sees
          # the merge commit and reports every page as stale).
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags upstream)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Install mdBook
        uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2.0.0
        with:
          mdbook-version: "latest"
      - name: Build mdBook
        run: cd docs && mdbook build
      - name: FR content-staleness check (F92 sub-task)
        # Strict on PRs since 2026-05-02: any FR page whose
        # `en-source-sha` stamp lags its EN counterpart's last-touching
        # commit fails the build. The initial stale backlog was
        # reconciled in commit 438fa48b (2026-05-01); main has been
        # `--strict` via docs-deploy.yml since the same date. Pair-locks
        # filename parity (F92) with content parity (F92 sub-task).
        run: python3 scripts/check_lang_staleness.py --strict
      - name: Build rustdoc
        run: cargo doc --all-features --no-deps --workspace
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    name: Security audit
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags upstream)
        with:
          toolchain: stable
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  dogfood:
    name: Dogfood on project docs
    needs: [changes, fmt, clippy, test]
    if: |
      always() &&
      (needs.changes.outputs.rust == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.infra == 'true') &&
      (needs.fmt.result == 'success' || needs.fmt.result == 'skipped') &&
      (needs.clippy.result == 'success' || needs.clippy.result == 'skipped') &&
      needs.test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags upstream)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Build binary
        run: cargo build --release --locked
      - name: Lint our own docs
        run: |
          ./target/release/lucid-lint check \
            README.md \
            CONTRIBUTING.md \
            CODING_STANDARDS.md \
            AGENTS.md \
            docs/src/ \
            || echo "::warning::lucid-lint found issues in its own docs (non-blocking)"
