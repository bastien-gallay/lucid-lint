name: CI

on:
  push:
    branches: [main, 'release/*']
  pull_request:
    branches: [main, 'release/*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --all-features --all-targets --workspace -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      # Opt-in gate checked by `tests/rule_docs_coverage.rs`: when set,
      # any rule source modified versus `origin/main` must be mentioned in
      # the CHANGELOG `## [Unreleased]` section.
      RULE_DOCS_GATE_GIT: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so the docs-gate test can diff against origin/main.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-features --workspace

  msrv:
    name: MSRV (Minimum Supported Rust Version)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.80"
      - uses: Swatinem/rust-cache@v2
      - name: Check builds with MSRV
        run: cargo check --all-features --workspace

  docs:
    name: Build docs (mdBook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "latest"
      - name: Build mdBook
        run: cd docs && mdbook build
      - name: FR content-staleness check (F92 sub-task)
        # Soft on PRs: reports drift on stderr, exits 0. Compares each
        # FR page's `en-source-sha` front-matter to the EN counterpart's
        # current last-touching commit. Strict mode is wired separately
        # on `main` via docs-deploy.yml once the existing stale backlog
        # is reconciled.
        run: python3 scripts/check_lang_staleness.py
      - name: Build rustdoc
        run: cargo doc --all-features --no-deps --workspace
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  dogfood:
    name: Dogfood on project docs
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Build binary
        run: cargo build --release --locked
      - name: Lint our own docs
        run: |
          ./target/release/lucid-lint check \
            README.md \
            CONTRIBUTING.md \
            CODING_STANDARDS.md \
            AGENTS.md \
            docs/src/ \
            || echo "::warning::lucid-lint found issues in its own docs (non-blocking)"
