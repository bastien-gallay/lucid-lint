name: CI

on:
  push:
    branches: [main, 'release/*']
  pull_request:
    branches: [main, 'release/*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      docs: ${{ steps.filter.outputs.docs }}
      infra: ${{ steps.filter.outputs.infra }}
      prose: ${{ steps.filter.outputs.prose }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            rust:
              - 'src/**/*.rs'
              - 'tests/**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'clippy.toml'
              - 'rustfmt.toml'
            docs:
              - 'docs/**/*.md'
              - '*.md'
            infra:
              - '.github/workflows/**'
              - 'justfile'
              - 'scripts/**'
            prose:
              - 'src/**/*.rs'
              - 'docs/**/*.md'
              - '*.md'
              - 'scripts/**/*.py'
              - '.github/workflows/**'

  fmt:
    name: Format
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags upstream)
        with:
          toolchain: stable
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags upstream)
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Run clippy
        run: cargo clippy --all-features --all-targets --workspace -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      # Opt-in gate checked by `tests/rule_docs_coverage.rs`: when set,
      # any rule source modified versus `origin/main` must be mentioned in
      # the CHANGELOG `## [Unreleased]` section.
      RULE_DOCS_GATE_GIT: "1"
    steps:
      - name: Determine if we should run
        shell: bash
        id: should_run
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]] || [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${{ needs.changes.outputs.rust }}" == "true" ]] || [[ "${{ needs.changes.outputs.docs }}" == "true" ]] || [[ "${{ needs.changes.outputs.infra }}" == "true" ]]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.should_run.outputs.run == 'true'
        with:
          # Fetch full history so the docs-gate test can diff against origin/main.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags upstream)
        if: steps.should_run.outputs.run == 'true'
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        if: steps.should_run.outputs.run == 'true'
      - name: Run tests
        if: steps.should_run.outputs.run == 'true'
        run: cargo test --all-features --workspace

  msrv:
    name: MSRV (Minimum Supported Rust Version)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Extract MSRV from Cargo.toml
        id: msrv
        run: |
          VERSION=$(grep '^rust-version' Cargo.toml | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Check builds with MSRV
        run: cargo check --all-features --workspace

  docs:
    name: Build docs (mdBook)
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so check_lang_staleness.py can resolve each
          # EN page's last-touching commit (shallow clone only sees
          # the merge commit and reports every page as stale).
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags upstream)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Install mdBook
        uses: taiki-e/install-action@db5fb34fa772531a3ece57ca434f579eb334e0fb # v2.75.30
        with:
          tool: mdbook
      - name: Build mdBook
        run: cd docs && mdbook build
      - name: FR content-staleness check (F92 sub-task)
        # Strict on PRs since 2026-05-02: any FR page whose
        # `en-source-sha` stamp lags its EN counterpart's last-touching
        # commit fails the build. The initial stale backlog was
        # reconciled in commit 438fa48b (2026-05-01); main has been
        # `--strict` via docs-deploy.yml since the same date. Pair-locks
        # filename parity (F92) with content parity (F92 sub-task).
        run: python3 scripts/check_lang_staleness.py --strict
      - name: Build rustdoc
        run: cargo doc --all-features --no-deps --workspace
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    name: Security audit
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install cargo-audit
        uses: taiki-e/install-action@db5fb34fa772531a3ece57ca434f579eb334e0fb # v2.75.30
        with:
          tool: cargo-audit
      - name: Run audit
        run: cargo audit

  typos:
    name: Spell check (typos)
    needs: changes
    if: needs.changes.outputs.prose == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run typos
        uses: crate-ci/typos@31978115339370fcb346e579de8f6e9ccf6913c4 # v1.31.1
        with:
          files: .
          exclude: '*.snap|examples/'

  link-check:
    name: Link check (lychee)
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          lycheeVersion: "v0.24.2"
          fail: true
          args: >-
            --no-progress
            --exclude 'localhost'
            --exclude 'file://'
            --exclude '\.html$'
            --exclude-path docs/book
            --exclude-path docs/src/SUMMARY.md
            README.md
            docs/src/**/*.md

  dogfood:
    name: Dogfood on project docs
    needs: [changes, fmt, clippy, test]
    if: |
      always() &&
      (needs.changes.outputs.rust == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.infra == 'true') &&
      (needs.fmt.result == 'success' || needs.fmt.result == 'skipped') &&
      (needs.clippy.result == 'success' || needs.clippy.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (no semver tags upstream)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Build binary
        run: cargo build --release --locked
      - name: Lint our own docs
        run: |
          ./target/release/lucid-lint check \
            README.md \
            CONTRIBUTING.md \
            CODING_STANDARDS.md \
            AGENTS.md \
            docs/src/ \
            || echo "::warning::lucid-lint found issues in its own docs (non-blocking)"
