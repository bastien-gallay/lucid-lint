name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2.0.0
        with:
          mdbook-version: 'latest'

      - name: Build mdBook
        run: cd docs && mdbook build

      - name: Post-process built HTML
        # sanitize stock fonts + rewrite EN ↔ FR lang-switch hrefs (F92).
        run: |
          python3 scripts/sanitize-stock-css.py
          python3 scripts/sync_lang_counterparts.py

      - name: Validate FR ↔ EN pair-completeness (F92)
        # Fails if any FR page lacks an EN counterpart (orphaned
        # translation). Untranslated EN pages are informational only
        # — F25 backlog, not a gate.
        run: python3 scripts/sync_lang_counterparts.py --check

      - name: FR content-staleness check (F92 sub-task)
        # Soft on `main` until the 17 already-stale pages from the
        # 2026-04-27 references-section sweep (F105/F105b) are
        # reconciled. Flip to `--strict` once the backlog clears.
        run: python3 scripts/check_lang_staleness.py

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
