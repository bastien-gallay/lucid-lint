# See https://pre-commit.com for more information
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.snap$|\.md$'
      - id: end-of-file-fixer
        exclude: '\.snap$'
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
        # Docs-site GIFs (TTY captures via `just tapes`) can push past
        # 500 KB; they are intentional published assets, not drift.
        exclude: '^docs/src/assets/tty/.+\.gif$'
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-features --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test (fast)
        entry: cargo test --all-features --lib
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.1
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint.yaml"]
        # Third-party scraped prose and reference manifests under
        # `examples/` are lint input for lucid-lint itself, not
        # output to be groomed by markdownlint. Also the large
        # `docs/book/` build artefact.
        exclude: '^(examples/|docs/book/)'
