# See https://pre-commit.com for more information
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.snap$|\.md$'
      - id: end-of-file-fixer
        exclude: '\.snap$'
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
        # Docs-site GIFs (TTY captures via `just tapes`) can push past
        # 500 KB; they are intentional published assets, not drift.
        exclude: '^docs/src/assets/tty/.+\.gif$'
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-features --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test (fast)
        entry: cargo test --all-features --lib
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.1
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint.yaml"]
        # Third-party scraped prose and reference manifests under
        # `examples/` are lint input for lucid-lint itself, not
        # output to be groomed by markdownlint. Also the large
        # `docs/book/` build artefact.
        exclude: '^(examples/|docs/book/)'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Lint-only at bootstrap. `ruff-format` is intentionally
      # deferred to a follow-up PR — adopting the formatter rewrites
      # ~9 scripts and would mix tooling-wiring with a format
      # rebaseline. Land the format pass on its own once this is in.
      - id: ruff
        args: ["--fix"]
        types_or: [python]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        # Scripts directory only — the repo's Python surface. Config
        # lives in pyproject.toml [tool.mypy]; the hook walks the
        # directory itself rather than per-file (`pass_filenames`).
        files: ^scripts/.*\.py$
        pass_filenames: false
        args: ["--config-file", "pyproject.toml"]
        additional_dependencies:
          - types-PyYAML
          - types-python-slugify

  - repo: https://github.com/crate-ci/typos
    rev: v1.31.1
    hooks:
      - id: typos
        # Snapshots and scraped examples are not source we author.
        exclude: '\.snap$|^examples/'

  - repo: https://github.com/lycheeverse/lychee.git
    rev: lychee-v0.24.2
    hooks:
      - id: lychee
        args:
          - "--no-progress"
          - "--exclude"
          - "localhost"
          - "--exclude-path"
          - "docs/book"
          - "--exclude-path"
          - "docs/src/SUMMARY.md"
          - "README.md"
          - "docs/src/**/*.md"
        # Lychee needs the full doc tree to resolve relative links,
        # not just staged files. Run on pre-push instead of pre-commit.
        always_run: true
        pass_filenames: false
        stages: [pre-push]
