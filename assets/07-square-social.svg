<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="256" height="256" role="img" aria-label="lucid-lint square logo">
  <title>lucid-lint</title>
  <desc>A lens flanked by a short wavy line on the left and a clean line on the right, composed as a square.</desc>

  <!-- Square social: balanced composition -->
  <!-- Wavy "before" line (shortened for square) -->
  <path d="M 16 64 Q 22 58, 28 64 T 42 64"
        fill="none"
        stroke="#6B7280"
        stroke-width="3.5"
        stroke-linecap="round"/>

  <!-- Lens -->
  <circle cx="64" cy="64" r="20"
          fill="none"
          stroke="#2E5EAA"
          stroke-width="4"/>

  <!-- Focus dot -->
  <circle cx="64" cy="64" r="3.5" fill="#2E5EAA"/>

  <!-- Clean "after" line (shortened for square) -->
  <line x1="86" y1="64" x2="112" y2="64"
        stroke="#1A1D24"
        stroke-width="3.5"
        stroke-linecap="round"/>
</svg>
