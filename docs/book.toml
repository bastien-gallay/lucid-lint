[book]
title = "lucid-lint"
authors = ["Bastien Gallay and contributors"]
description = "A cognitive accessibility linter for prose."
language = "en"
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/bastien-gallay/lucid-lint"
edit-url-template = "https://github.com/bastien-gallay/lucid-lint/edit/main/docs/{path}"
site-url = "/lucid-lint/"
additional-css = [
  "theme/css/lucid-colors.css",
  "theme/css/lucid-typography.css",
  "theme/css/lucid-layout.css",
]
additional-js = [
  "theme/js/lucid-navigation.js",
]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 15
use-boolean-and = true

[output.html.playground]
editable = false
copyable = true
copy-js = true
line-numbers = true

# URL parallelism with the EN page. mdBook emits the FR stub at
# /fr/index.html; the EN-equivalent slug is /introduction.html, so
# any link or bookmark to /fr/introduction.html should resolve.
[output.html.redirect]
"/fr/introduction.html" = "/fr/index.html"
