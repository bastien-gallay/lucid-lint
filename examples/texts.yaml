# ── Known gaps ────────────────────────────────────────────────────────────

gaps:
  - No solid dyscalculia-specific corpus found; only `structure.mixed-numeric-format`-adjacent WCAG notes.
  - Aphasia-specific French samples beyond SPF/HAS are thin (partially closed by Mon Parcours Handicap FALC fact sheets, Etalab 2.0).
  - No ADHD-specific *before/after* prose pairs found; evidence base is mostly layout. Condition-explainer prose is now covered by the NIMH and CDC public-domain pages (F84 part 2, 2026-04-27).
  - No open legal/EULA dataset with expert plain-language annotations at scale (ToSDR has uneven coverage).
