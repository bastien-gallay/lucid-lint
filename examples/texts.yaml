# ── Known gaps ────────────────────────────────────────────────────────────
gaps:
  - No solid dyscalculia-specific corpus found; only `structure.mixed-numeric-format`-adjacent WCAG notes.
  - Aphasia-specific French samples beyond SPF/HAS are thin.
  - No ADHD-specific before/after prose pairs; evidence base is mostly layout.
  - No open legal/EULA dataset with expert plain-language annotations at scale (ToSDR has uneven coverage).
