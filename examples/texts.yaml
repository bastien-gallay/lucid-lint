# Referential of example texts for lucid-lint
#
# Purpose: a curated index of publicly-accessible text sources usable as
# examples in docs, as fixtures for tests, or as corpora for benchmarks.
#
# Distinct from examples/REFERENCES.md (which lists *academic* references
# behind the rules). This file lists *text sources* the rules can be run on.
#
# Schema — each entry under `sources:` has:
#   url                 source URL
#   title               short title
#   description         one-sentence summary
#   type                research_paper | standard | style_guide | corpus |
#                       tool_fixtures | gov_guide | blog | dataset |
#                       textbook | sample_collection
#   polarity            good_example | bad_example | before_after |
#                       mixed_unaligned | neutral
#                         - before_after: aligned good/bad pairs with commentary
#                         - mixed_unaligned: both polarities but not paired
#   rules_relevant      list of lucid-lint rule IDs it most maps to
#   conditions          subset of [a11y-markup, dyslexia, dyscalculia,
#                       aphasia, adhd, non-native, general]
#   languages           subset of [en, fr]
#   bilingual_parallel  true if the source provides *aligned* EN/FR content
#   interest            high | medium | low  — usefulness for our example set
#   confidence          high | medium | low  — weighted by
#                         (a) institutional weight: research > gov/standard >
#                             association > blog > forum
#                         (b) claims explained vs asserted
#                         (c) consistency with other sources
#   use_case            subset of [example, benchmark, corpus, documentation]
#   has_explanations    true if the source explains *why* text is good/bad
#   license_or_access   open | restricted | unknown
#   redistribution      public_ok | link_only | restricted | check_license
#                         - public_ok: open/compatible licence; extracts may
#                           be bundled into the public git repo with attribution
#                         - link_only: copyrighted but publicly reachable; link
#                           to the source, do NOT commit extracts
#                         - restricted: paywalled, research-request gated, or
#                           explicit no-redistribution; not usable as a public
#                           asset at all
#                         - check_license: licence exists but carries
#                           constraints (NC, SA, per-item variance) — review
#                           before bundling
#   license_details     one-liner on the actual licence (when known)
#   markdownable        integer 0–5 — how easily the source can be turned
#                       into Markdown fixtures for lucid-lint tests:
#                         5 = already Markdown, wikitext, plain text, or
#                             deterministic conversion (CSV/JSON/XML datasets,
#                             MediaWiki dumps, GitHub repos with .md files)
#                         4 = clean, well-structured HTML — easy pandoc/
#                             readability-style conversion
#                         3 = HTML with significant noise (ads, navigation,
#                             rich layout); conversion needs cleanup
#                         2 = PDF that is mostly flowing text — OCR/extract
#                             plus manual cleanup
#                         1 = PDF / HTML with complex layout, tables, images
#                             interleaved — heavy manual work
#                         0 = impossible (image-only, proprietary binary,
#                             no accessible source)
#   notes               optional one-liner

redistribution_legend:
  public_ok:
    meaning: >
      Open or compatible licence. Extracts can be committed to
      examples/public/ with attribution. Check each licence's
      attribution / share-alike requirements before copying.
  check_license:
    meaning: >
      Licence is permissive in principle but carries constraints —
      typically NC (no commercial), SA (share-alike / copyleft), or
      per-item variance within a repo. Verify per use before bundling.
  link_only:
    meaning: >
      Copyrighted and publicly reachable, but the licence does not grant
      redistribution rights. Cite and link; don't copy extracts beyond a
      short fair-use quotation with clear attribution.
  restricted:
    meaning: >
      Access is gated (paywall, research-request, click-through
      agreement) or the licence explicitly forbids redistribution. Cite
      only; don't include in this repo.

markdownable_legend:
  "5": Already Markdown / wikitext / plain text / deterministic conversion.
  "4": Clean HTML — easy automated conversion.
  "3": HTML with noise; cleanup needed.
  "2": PDF mostly flowing text; extract + manual cleanup.
  "1": PDF/HTML with complex layout; heavy manual work.
  "0": Impossible — no accessible source.

