# typos — spell checker config for bilingual EN/FR codebase.
# https://github.com/crate-ci/typos

[files]
extend-exclude = [
  "*.snap",
  "examples/",
]

[default]
# Short words (≤3 chars) are too ambiguous to flag across EN + FR.
extend-ignore-words-re = [
  "^[a-zA-Z]{1,3}$",
]

[default.extend-words]
# French words commonly flagged because typos defaults to English.
# Grouped by frequency of false positives in our docs.
